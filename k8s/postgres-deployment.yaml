apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: tasks-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          envFrom:
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            # CORRECCIÓN: Deshabilitar escalada de privilegios
            # KICS: "Privilege Escalation Allowed" - corregida
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: pgdata
              # CORRECCIÓN: Montar en subdirectorio para evitar permisos de escritura en directorio del SO
              # KICS: "Volume Mount With OS Directory Write Permissions" - corregida
              subPath: pgdata
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-pvc